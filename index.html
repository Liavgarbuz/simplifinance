<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>SimpliFinance</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f3ee;--surface:#fffffe;--surface2:#f5f3ee;--surface3:#ece9e3;
  --border:#e0dbd2;--border2:#ccc6bb;
  --text:#1a1814;--text2:#6b6457;--text3:#a09880;
  --green:#1a6b42;--green-bg:#eef7f1;--green-lt:#b8e6cc;
  --red:#c0392b;--red-bg:#fdf0ef;--red-lt:#f5c4bf;
  --amber:#9a6b1a;--amber-bg:#fdf6e8;--amber-lt:#f5dfa0;
  --blue:#1a4f8a;--blue-bg:#eef3fb;--blue-lt:#bed0f0;
  --purple:#5a3d8a;--purple-bg:#f3eefb;--purple-lt:#d0c0f0;
  --shadow:0 1px 4px rgba(0,0,0,0.06),0 2px 10px rgba(0,0,0,0.04);
  --shadow-md:0 4px 20px rgba(0,0,0,0.09),0 1px 4px rgba(0,0,0,0.04);
  --shadow-lg:0 8px 40px rgba(0,0,0,0.12),0 2px 8px rgba(0,0,0,0.06);
  --r:14px;--r2:10px;--r3:7px;
  --font:'DM Sans',system-ui,sans-serif;
  --font-d:'DM Serif Display',Georgia,serif;
  --safe-top: env(safe-area-inset-top);
  --safe-bot: env(safe-area-inset-bottom);
}
html{font-size:15px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
input,select,button{font-family:var(--font);font-size:inherit}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
button{cursor:pointer}
::selection{background:var(--green-lt);color:var(--green)}

/* ── SHELL ── */
.app-shell{display:flex;flex-direction:column;min-height:100dvh}

/* ── MOBILE HEADER ── */
.mob-header{display:none;position:sticky;top:0;z-index:300;background:var(--text);padding:calc(12px + var(--safe-top)) 16px 12px;align-items:center;justify-content:space-between}
.mob-brand{font-family:var(--font-d);font-size:18px;color:#fff}
.mob-menu{background:none;border:none;color:rgba(255,255,255,0.7);font-size:22px;padding:4px 8px;line-height:1}

/* ── DESKTOP LAYOUT ── */
.desktop-shell{display:flex;flex:1}
.sidebar{width:232px;background:var(--text);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:200;transition:transform 0.25s cubic-bezier(.4,0,.2,1)}
.sb-brand{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,0.07)}
.sb-name{font-family:var(--font-d);font-size:19px;color:#fff;letter-spacing:-0.2px}
.sb-tag{font-size:10px;color:rgba(255,255,255,0.28);letter-spacing:0.12em;text-transform:uppercase;margin-top:2px}
.sb-nav{flex:1;padding:14px 10px;overflow-y:auto;display:flex;flex-direction:column;gap:1px}
.ni{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;color:rgba(255,255,255,0.5);font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:all 0.15s}
.ni:hover{color:rgba(255,255,255,0.9);background:rgba(255,255,255,0.06)}
.ni.on{color:#fff;background:rgba(255,255,255,0.12);font-weight:700}
.ni-ico{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sb-foot{padding:14px 10px;border-top:1px solid rgba(255,255,255,0.07)}
.user-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;cursor:pointer;transition:background 0.15s}
.user-row:hover{background:rgba(255,255,255,0.06)}
.uav{width:32px;height:32px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.uname{font-size:12px;color:rgba(255,255,255,0.7);font-weight:600}
.uhint{font-size:10px;color:rgba(255,255,255,0.28)}
.main-area{margin-left:232px;flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)}
.tb-title{font-family:var(--font-d);font-size:17px;flex:1;color:var(--text)}
.infl-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:999px;border:1.5px solid var(--border);background:none;font-size:11px;font-weight:700;color:var(--text2);transition:all 0.15s;white-space:nowrap}
.infl-btn.on{border-color:var(--purple);background:var(--purple-bg);color:var(--purple)}
.infl-dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.infl-rate-input{width:60px;border:1.5px solid var(--purple);border-radius:var(--r3);background:var(--purple-bg);color:var(--purple);font-size:12px;padding:4px 8px;outline:none;font-weight:700}
.page{padding:22px 24px 100px;max-width:1060px}

/* ── MOBILE NAV OVERLAY ── */
.nav-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:199;opacity:0;transition:opacity 0.25s}
.nav-overlay.show{opacity:1}

/* ── MOBILE BOTTOM NAV ── */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:300;background:var(--surface);border-top:1px solid var(--border);padding:8px 0 calc(8px + var(--safe-bot));box-shadow:0 -4px 20px rgba(0,0,0,0.08)}
.bnav{display:flex;justify-content:space-around;align-items:center}
.bni{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;border:none;background:none;color:var(--text3);font-size:10px;font-weight:600;min-width:44px;border-radius:8px;transition:all 0.15s}
.bni.on{color:var(--green)}
.bni-ico{font-size:20px;line-height:1}

/* ── SEARCH ── */
.sw{position:relative}
.si{background:var(--surface2);border:1.5px solid var(--border);border-radius:999px;padding:6px 14px 6px 32px;font-size:12px;color:var(--text);outline:none;width:220px;transition:all 0.15s}
.si:focus{border-color:var(--green);background:#fff;box-shadow:0 0 0 3px var(--green-bg);width:240px}
.s-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text3);pointer-events:none}
.sr{position:absolute;top:calc(100%+5px);right:0;width:280px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-md);z-index:400;max-height:260px;overflow-y:auto}
.sri{padding:9px 13px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.1s}
.sri:last-child{border-bottom:none}
.sri:hover{background:var(--surface2)}
.sri-t{font-size:12.5px;font-weight:600}
.sri-s{font-size:10.5px;color:var(--text3);margin-top:1px}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
.card-t{font-family:var(--font-d);font-size:15px;color:var(--text);margin-bottom:2px}
.card-s{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;font-weight:700;margin-bottom:14px}
.card-h{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}

/* ── STAT CARDS ── */
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:15px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat-bar{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0}
.stat-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.09em;font-weight:700;margin-bottom:5px}
.stat-v{font-family:var(--font-d);font-size:22px;color:var(--text);line-height:1.1;margin-bottom:3px}
.stat-v.infl{font-size:14px;color:var(--purple);margin-bottom:2px}
.stat-m{font-size:10.5px;color:var(--text2)}
.up{color:var(--green)!important}.dn{color:var(--red)!important}
.infl-badge{font-size:8px;background:var(--purple-bg);color:var(--purple);border-radius:4px;padding:1px 4px;font-weight:700;margin-left:3px;vertical-align:middle}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stack{display:flex;flex-direction:column;gap:12px}

/* ── FORM ── */
.field{display:flex;flex-direction:column;gap:4px}
.lbl{font-size:10.5px;color:var(--text2);font-weight:700;letter-spacing:0.04em;text-transform:uppercase;display:flex;align-items:center;gap:4px}
.inp{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r2);color:var(--text);font-size:14px;padding:10px 11px;outline:none;transition:all 0.15s;width:100%;-webkit-appearance:none}
.inp:focus{border-color:var(--green);background:#fff;box-shadow:0 0 0 3px var(--green-bg)}
.inp::placeholder{color:var(--text3)}
.inp-p{position:relative}.inp-p .inp{padding-left:22px}
.inp-ps{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none;z-index:1}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* ── TOGGLE ── */
.tog{display:flex;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r2);overflow:hidden}
.tog-b{flex:1;padding:9px 12px;border:none;background:none;color:var(--text2);font-size:13px;font-weight:600;transition:all 0.15s}
.tog-b.on{background:var(--text);color:#fff}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--r2);border:none;font-size:13px;font-weight:600;transition:all 0.15s}
.btn-dark{background:var(--text);color:#fff}.btn-dark:hover{background:#2d2b26}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{opacity:.9}
.btn-ghost{background:none;border:1.5px solid var(--border);color:var(--text2)}.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-sm{padding:6px 13px;font-size:12px}
.btn-del{background:none;border:none;color:var(--text3);font-size:14px;padding:4px 7px;border-radius:5px;transition:color 0.15s;min-width:30px;min-height:30px;display:flex;align-items:center;justify-content:center}.btn-del:hover{color:var(--red)}
.btn-add{display:flex;align-items:center;justify-content:center;gap:6px;background:none;border:1.5px dashed var(--border2);border-radius:var(--r2);padding:10px;color:var(--text3);font-size:13px;font-weight:600;width:100%;transition:all 0.15s}.btn-add:hover{color:var(--green);border-color:var(--green);background:var(--green-bg)}

/* ── TOOLTIP ── */
.tip{position:relative;display:inline-flex;align-items:center;cursor:help}
.tip-i{width:14px;height:14px;border-radius:50%;background:var(--surface3);color:var(--text3);font-size:8px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.tip-box{position:absolute;bottom:calc(100%+6px);left:50%;transform:translateX(-50%);background:#1a1814;color:#fff;font-size:11px;line-height:1.55;padding:8px 12px;border-radius:9px;width:220px;z-index:9999;pointer-events:none;opacity:0;transition:opacity 0.15s;font-weight:400;white-space:normal}
.tip:hover .tip-box{opacity:1}
.tip-box::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1a1814}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:0.03em}
.bg{background:var(--green-bg);color:var(--green)}.br{background:var(--red-bg);color:var(--red)}
.ba{background:var(--amber-bg);color:var(--amber)}.bb{background:var(--blue-bg);color:var(--blue)}
.bp{background:var(--purple-bg);color:var(--purple)}

/* ── INSIGHT BOXES ── */
.ins{border-radius:var(--r2);padding:13px 15px;display:flex;flex-direction:column;gap:4px}
.ins.g{background:var(--green-bg);border:1px solid var(--green-lt)}
.ins.a{background:var(--amber-bg);border:1px solid var(--amber-lt)}
.ins.b{background:var(--blue-bg);border:1px solid var(--blue-lt)}
.ins.r{background:var(--red-bg);border:1px solid var(--red-lt)}
.ins.p{background:var(--purple-bg);border:1px solid var(--purple-lt)}
.ins-l{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.08em}
.ins.g .ins-l{color:var(--green)}.ins.a .ins-l{color:var(--amber)}.ins.b .ins-l{color:var(--blue)}.ins.r .ins-l{color:var(--red)}.ins.p .ins-l{color:var(--purple)}
.ins p{font-size:12px;color:var(--text2);line-height:1.6}

/* ── DISCLAIMER ── */
.disclaimer{background:var(--amber-bg);border:1.5px solid var(--amber-lt);border-radius:var(--r2);padding:13px 15px}
.disclaimer-t{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:var(--amber);margin-bottom:4px}
.disclaimer p{font-size:11.5px;color:var(--text2);line-height:1.6}

/* ── COACH BANNER ── */
.coach{background:linear-gradient(135deg,#0d1f12 0%,#0a2617 50%,#112010 100%);border-radius:var(--r);padding:20px 22px;color:#fff;position:relative;overflow:hidden}
.coach::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(26,107,66,0.15)}
.coach-hi{font-size:10px;color:rgba(255,255,255,0.38);text-transform:uppercase;letter-spacing:0.1em;font-weight:700;margin-bottom:4px}
.coach-msg{font-family:var(--font-d);font-size:15px;line-height:1.5;margin-bottom:12px;color:rgba(255,255,255,0.93)}
.coach-tips{display:flex;flex-direction:column;gap:4px}
.coach-tip{font-size:12px;color:rgba(255,255,255,0.55);display:flex;gap:7px;line-height:1.5}
.coach-tip::before{content:'→';color:#3dd68c;flex-shrink:0}

/* ── FOOTNOTE ── */
.fn{font-size:10px;color:var(--text3);margin-top:8px;line-height:1.55;font-style:italic;border-top:1px solid var(--border);padding-top:7px}

/* ── DONUT CHART ── */
.donut-wrap{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.legend{display:flex;flex-direction:column;gap:7px;flex:1;min-width:110px}
.leg-row{display:flex;align-items:center;gap:6px;font-size:11px}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── BAR CHART ── */
.bars{display:flex;flex-direction:column;gap:8px}
.brow{display:grid;grid-template-columns:110px 1fr 72px;gap:8px;align-items:center}
.blbl{font-size:11px;color:var(--text2);text-align:right;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btrack{background:var(--surface3);border-radius:99px;height:6px;overflow:hidden}
.bfill{height:100%;border-radius:99px;transition:width 0.5s cubic-bezier(.4,0,.2,1)}
.bval{font-size:11px;color:var(--text);font-weight:600;text-align:right}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;font-weight:700;padding:0 9px 8px;text-align:left;border-bottom:1.5px solid var(--border);white-space:nowrap}
.tbl th.r{text-align:right}
.tbl td{padding:9px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text);vertical-align:middle}
.tbl td.r{text-align:right;font-variant-numeric:tabular-nums}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(0,0,0,0.015)}
.ti{background:transparent;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:12px;width:100%;min-width:0;text-align:inherit}
.ti:focus{background:var(--green-bg);border-radius:4px;padding:1px 4px;outline:1px solid var(--green)}

/* ── SUB-TABS ── */
.stabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.stab{padding:6px 14px;border-radius:999px;border:1.5px solid var(--border);background:none;color:var(--text2);font-size:11.5px;font-weight:700;transition:all 0.15s;min-height:34px}
.stab:hover{border-color:var(--border2);color:var(--text)}
.stab.on{background:var(--text);color:#fff;border-color:var(--text)}

/* ── DIVIDER ── */
.div{height:1px;background:var(--border);margin:14px 0}

/* ── TAX ROWS ── */
.tax-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.tax-row:last-child{border-bottom:none}
.tax-row.sub .tax-l{padding-left:16px;font-size:11.5px;color:var(--text3)}
.tax-row.tot{border-top:2px solid var(--border);border-bottom:none;padding-top:12px;margin-top:4px}
.tax-l{font-size:13px;color:var(--text2)}
.tax-v{font-size:13px;font-weight:700;font-family:var(--font-d);color:var(--text)}
.tax-v.r{color:var(--red)}.tax-v.g{color:var(--green)}.tax-v.a{color:var(--amber)}

/* ── VISUAL TIMELINE ── */
.vtl-item{display:flex;gap:14px;align-items:flex-start;margin-bottom:0;position:relative}
.vtl-left{display:flex;flex-direction:column;align-items:center;gap:0;flex-shrink:0;width:54px}
.vtl-yr{font-size:9px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;text-align:center;margin-bottom:4px}
.vtl-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;border:3px solid var(--bg);box-shadow:var(--shadow-md);position:relative;z-index:2;flex-shrink:0}
.vtl-line{width:2px;flex:1;min-height:20px;background:var(--border);margin:0 auto}
.vtl-body{flex:1;padding-bottom:20px}
.vtl-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;box-shadow:var(--shadow)}
.vtl-card.hl{border-color:var(--green);box-shadow:0 0 0 3px var(--green-bg),var(--shadow)}
.vtl-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.vtl-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.vtl-chip{font-size:10px;padding:2px 8px;border-radius:999px;font-weight:700;display:inline-flex;align-items:center;gap:3px}
.vtl-impact{font-size:11px;color:var(--text2);margin-top:6px;padding-top:7px;border-top:1px solid var(--border);display:flex;gap:14px;flex-wrap:wrap}
.vtl-impact-item{}
.vtl-impact-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;font-weight:700;margin-bottom:2px}
.vtl-impact-val{font-size:13px;font-weight:700}

/* ── CHATBOT ── */
.chat-fab{position:fixed;bottom:calc(70px + var(--safe-bot));right:16px;width:52px;height:52px;border-radius:50%;background:var(--green);border:none;color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-lg);z-index:500;transition:all 0.2s}
.chat-panel{position:fixed;bottom:calc(134px + var(--safe-bot));right:16px;width:calc(100vw - 32px);max-width:360px;background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-lg);z-index:500;display:flex;flex-direction:column;max-height:420px;overflow:hidden}
.chat-head{padding:12px 14px;background:var(--text);border-radius:16px 16px 0 0;display:flex;align-items:center;justify-content:space-between}
.chat-ht{font-size:13px;font-weight:700;color:#fff;display:flex;align-items:center;gap:7px}
.chat-hc{background:none;border:none;color:rgba(255,255,255,0.4);font-size:18px;padding:2px 6px;min-width:30px;min-height:30px}.chat-hc:hover{color:#fff}
.chat-msgs{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;display:flex;flex-direction:column;gap:9px;min-height:160px}
.msg{max-width:88%;border-radius:12px;padding:9px 12px;font-size:12.5px;line-height:1.6}

const pct=(n,d=1)=>`${((n||0)*100).toFixed(d)}%`;

const realVal=(nom,r,n)=>nom/Math.pow(1+r,n);
const fvL=(pv,r,n)=>pv*Math.pow(1+r,n);
const fvA=(pmt,r,n)=>r===0?pmt*n:pmt*((Math.pow(1+r,n)-1)/r);

// ─── 2026 TAX DATA ───────────────────────────────────────────────────────────
const STD={single:15000,married:30000,hoh:22500};
const BR={
  single:[[11925,.10],[48475,.12],[103350,.22],[197300,.24],[250525,.32],[626350,.35],[Infinity,.37]],
  married:[[23850,.10],[96950,.12],[206700,.22],[394600,.24],[501050,.32],[751600,.35],[Infinity,.37]],
  hoh:[[17000,.10],[64850,.12],[103350,.22],[197300,.24],[250500,.32],[626350,.35],[Infinity,.37]],
};
const LTCG_BR={
  single:[[48350,0],[533400,.15],[Infinity,.20]],
  married:[[96700,0],[600050,.15],[Infinity,.20]],
  hoh:[[64750,0],[566700,.15],[Infinity,.20]],
};
const SS_BASE=176100;
const LIM={k401:23500,ira:7000,hsa_s:4300};

function fedTax(taxable,status){
  const br=BR[status]||BR.single;
  let tax=0,prev=0;
  for(const[lim,rate]of br){
    if(taxable<=prev)break;
    tax+=(Math.min(taxable,lim)-prev)*rate;
    prev=lim;
    if(taxable<=lim)break;
  }
  return tax;
}
function calcFICA(wages,status){
  const ss=Math.min(wages,SS_BASE)*.062;
  const med=wages*.0145;
  const addl=Math.max(0,wages-(status==='married'?250000:200000))*.009;
  return{ss,med,addl,total:ss+med+addl};
}
function ltcgTax(gain,ordIncome,status){
  const thr=LTCG_BR[status]||LTCG_BR.single;
  let tax=0,prev=0,rem=gain;
  for(const[lim,rate]of thr){
    const space=Math.max(0,lim-Math.max(ordIncome,prev));
    const chunk=Math.min(rem,space);
    tax+=chunk*rate;
    rem-=chunk;prev=lim;
    if(rem<=0)break;
  }
  return tax;
}
function marginalRate(taxable,status){
  const br=BR[status]||BR.single;
  let prev=0;
  for(const[lim,rate]of br){if(taxable<=lim)return rate;prev=lim;}
  return .37;
}
function niit(inv,agi,status){
  return Math.max(0,Math.min(inv,agi-(status==='married'?250000:200000)))*.038;
}

// ─── BUDGET ENGINE ───────────────────────────────────────────────────────────
function calcBudget(d){
  const w2=d.incomes.filter(i=>i.type==='w2').reduce((s,i)=>s+num(i.amount),0)+num(d.bonus);
  const se=d.incomes.filter(i=>i.type==='self').reduce((s,i)=>s+num(i.amount),0);
  const passive=d.incomes.filter(i=>!['w2','self'].includes(i.type)).reduce((s,i)=>s+num(i.amount),0);
  const gross=w2+se+passive;
  const pre401k=num(d.retirement.trad401k)*12;
  const tradIRA=num(d.retirement.tradIRA)*12;
  const hsaDed=num(d.retirement.hsa)*12;
  const seDed=se*.5;
  const slIntDed=Math.min(num(d.deductions?.studentLoanInt||0),2500);
  const agi=Math.max(0,gross-pre401k-tradIRA-hsaDed-seDed-slIntDed);
  const stdDed=STD[d.filingStatus]||STD.single;
  const itemDed=d.itemize?(num(d.deductions?.mortgage||0)+Math.min(num(d.deductions?.salt||0),10000)+num(d.deductions?.charitable||0)+Math.max(0,num(d.deductions?.medical||0)-agi*.075)+num(d.deductions?.other||0)):0;
  const ded=d.itemize?Math.max(stdDed,itemDed):stdDed;
  const credits=Object.values(d.credits||{}).reduce((s,v)=>s+num(v),0);
  const taxable=Math.max(0,agi-ded);
  const ft=fedTax(taxable,d.filingStatus);
  const fica=calcFICA(w2+se*.9235,d.filingStatus);
  const stateTax=agi*num(d.stateRate)/100;
  const totalTax=Math.max(0,ft+fica.total+stateTax-credits);
  const netAnnual=gross-totalTax;
  const retMonthly=Object.values(d.retirement).reduce((s,v)=>s+num(v),0);
  const expMonthly=d.expenses.reduce((s,e)=>s+num(e.amount),0);
  const debtPmt=d.liabilities.reduce((s,l)=>s+num(l.payment),0);
  const annualSavings=netAnnual-(expMonthly+retMonthly)*12-debtPmt*12;
  const savingsRate=gross>0?Math.max(0,annualSavings)/gross:0;
  const marg=marginalRate(taxable,d.filingStatus);
  const eff=gross>0?totalTax/gross:0;
  return{w2,se,passive,gross,pre401k,tradIRA,hsaDed,seDed,slIntDed,agi,stdDed,itemDed,ded,credits,taxable,fedTax:ft,fica,stateTax,totalTax,netAnnual,retMonthly,expMonthly,debtPmt,annualSavings,savingsRate,marginal:marg,effective:eff};
}

// ─── PROJECTION ENGINE ───────────────────────────────────────────────────────
function buildProjection({budget,d,prices,inflRate,years=35}){
  const getP=h=>prices[h.ticker?.toUpperCase()]?.price||num(h.price);
  const allH=d.accounts.flatMap(a=>a.holdings);
  const totPort=allH.reduce((s,h)=>s+num(h.shares)*getP(h),0);
  const wRet=totPort>0?allH.reduce((s,h)=>{const mv=num(h.shares)*getP(h);return s+(mv/totPort)*num(h.expRet)},0):7;
  const portRate=wRet/100;
  const cash=num(d.checkingBal)+num(d.savingsBal)+num(d.emergencyFund);
  const initLiab=d.liabilities.reduce((s,l)=>s+num(l.balance),0);
  const baseMonthlySav=budget.annualSavings/12;
  const curYear=new Date().getFullYear();
  const rows=[];
  let portVal=totPort,liabVal=initLiab;
  for(let i=0;i<=years;i++){
    const yr=curYear+i;
    const newMs=d.timeline.filter(m=>Number(m.year)===yr);
    const lumpCost=newMs.reduce((s,m)=>s+num(m.cost),0);
    const cumDelta=d.timeline.filter(m=>Number(m.year)<=yr).reduce((s,m)=>s+num(m.monthlyDelta),0);
    const effMonthlySav=baseMonthlySav+cumDelta;
    if(i>0){
      portVal=portVal*(1+portRate)+Math.max(0,effMonthlySav*12);
      const mr=d.liabilities.length>0?d.liabilities.reduce((s,l)=>s+num(l.rate)/100/12,0)/Math.max(d.liabilities.length,1):0;
      const totPmts=d.liabilities.reduce((s,l)=>s+num(l.payment),0)*12;
      liabVal=Math.max(0,liabVal*Math.pow(1+mr,12)-totPmts);
      portVal=Math.max(0,portVal-lumpCost);
    }
    const nomNW=portVal+cash-liabVal;
    rows.push({year:yr,age:d.age+i,nomNW,realNW:realVal(nomNW,inflRate,i),portVal,liabVal,lumpCost,effMonthlySav,newMs});
  }
  return rows;
}

// ─── SVG SPARKLINE ─────────────────────────────────────────────────────────
function Spark({data,color='#1a6b42',data2=null,color2='#5a3d8a',h=70}){
  if(!data||data.length<2)return null;
  const all=[...data,...(data2||[])];
  const maxV=Math.max(...all),minV=Math.min(...all,0);
  const range=maxV-minV||1;
  const W=400,H=h,p=4;
  const tx=i=>p+(i/(data.length-1))*(W-p*2);
  const ty=v=>H-p-((v-minV)/range)*(H-p*2);
  const mkPath=arr=>arr.map((v,i)=>`${i===0?'M':'L'}${tx(i).toFixed(1)},${ty(v).toFixed(1)}`).join(' ');
  const mkArea=arr=>{const d=mkPath(arr);return`${d} L${tx(arr.length-1)},${H} L${tx(0)},${H} Z`};
  return h`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${h}px" preserveAspectRatio="none">
    <defs>
      <linearGradient id="sg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.15"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient>
      ${data2?h`<linearGradient id="sg2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color2}" stop-opacity="0.10"/><stop offset="100%" stop-color="${color2}" stop-opacity="0"/></linearGradient>`:null}
    </defs>
    <path d="${mkArea(data)}" fill="url(#sg1)"/>
    <path d="${mkPath(data)}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${data2?h`<><path d="${mkArea(data2)}" fill="url(#sg2)"/><path d="${mkPath(data2)}" fill="none" stroke="${color2}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6 3"/></>`:null}
  </svg>`;
}

// ─── DONUT CHART ──────────────────────────────────────────────────────────────
function Donut({slices,size=130,stroke=24,ctr,sub}){
  const r=(size-stroke)/2,circ=2*Math.PI*r;
  const valid=slices.filter(s=>s.value>0);
  const total=valid.reduce((s,x)=>s+x.value,0);
  let cum=0;
  return h`<div class="donut-wrap">
    <svg width="${size}" height="${size}" style="flex-shrink:0">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--surface3)" stroke-width="${stroke}"/>
      ${valid.map((s,i)=>{const f=s.value/total,dash=f*circ,off=-cum*circ+circ*.25;cum+=f;return h`<circle key="${i}" cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${stroke}" stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${off}" style="transform:rotate(-90deg);transform-origin:center"/>` })}
      ${ctr?h`<><text x="${size/2}" y="${size/2-5}" text-anchor="middle" fill="var(--text)" font-family="DM Serif Display,Georgia,serif" font-size="11" font-weight="600">${ctr}</text><text x="${size/2}" y="${size/2+8}" text-anchor="middle" fill="var(--text3)" font-family="DM Sans,system-ui,sans-serif" font-size="8">${sub}</text></>`:null}
    </svg>
    <div class="legend">${valid.map((s,i)=>h`<div key="${i}" class="leg-row"><span class="leg-dot" style="background:${s.color}"/><span style="color:var(--text2);flex:1;font-size:11px">${s.label}</span><span style="font-weight:700;font-size:11px">${fmt(s.value)}</span><span style="color:var(--text3);margin-left:4px;font-size:10px">${total>0?pct(s.value/total):'—'}</span></div>`)}</div>
  </div>`;
}

}

  mece:'MECE: Mutually Exclusive, Collectively Exhaustive. Every dollar belongs to exactly one category.',
  agi:'AGI = Gross Income minus above-the-line deductions (401k, IRA, HSA, SE tax deduction, student loan interest).',
};
function Tip({k,children}){
  return h`<span class="tip">${children}<span class="tip-i">?</span><span class="tip-box">${TIPS[k]||k}</span></span>`;
}

// ─── AUTH SCREEN ──────────────────────────────────────────────────────────────
function AuthScreen({onLogin}){
  const[mode,setMode]=useState('login');
  const[name,setName]=useState('');
  const[pin,setPin]=useState('');
  const[confirm,setConfirm]=useState('');
  const[err,setErr]=useState('');
  const go=()=>{
    setErr('');
    const ps=loadP();
    if(mode==='register'){
      if(!name.trim())return setErr('Enter your name.');
      if(pin.length<4)return setErr('PIN must be 4+ digits.');
      if(pin!==confirm)return setErr('PINs don\'t match.');
      const id=name.toLowerCase().replace(/\s+/g,'_')+'_'+Date.now();
      ps[id]={id,name:name.trim(),pin,data:mkDefault(name.trim())};
      saveP(ps);onLogin(ps[id]);
    }else{
      const m=Object.values(ps).find(p=>p.name.toLowerCase()===name.toLowerCase()&&p.pin===pin);
      if(!m)return setErr('Name or PIN not found.');
      onLogin(m);
    }
  };
  return h`<div class="login-bg"><div class="login-card fu">
    <div class="login-brand">SimpliFinance</div>
    <div class="login-sub">${mode==='login'?'Sign in to your profile.':'Create your personal finance dashboard.'}</div>
    <div class="stack" style="gap:11px">
      <div class="field"><label class="lbl">Your Name</label><input class="inp" placeholder="e.g. Alex" value="${name}" onInput=${e=>setName(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&go()}/></div>
      <div class="field"><label class="lbl">PIN / Password</label><input class="inp" type="password" placeholder="••••" value="${pin}" onInput=${e=>setPin(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&go()}/></div>
      ${mode==='register'?h`<div class="field"><label class="lbl">Confirm PIN</label><input class="inp" type="password" placeholder="••••" value="${confirm}" onInput=${e=>setConfirm(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&go()}/></div>`:null}
      ${err?h`<div class="login-err">${err}</div>`:null}
      <button class="btn btn-dark" style="width:100%;justify-content:center;padding:12px 0;font-size:15px" onClick=${go}>${mode==='login'?'Sign In →':'Create Profile'}</button>
    </div>
    <div style="text-align:center;font-size:12px;color:var(--text3);margin-top:12px">
      ${mode==='login'
        ?h`<span style="color:var(--green);cursor:pointer;font-weight:700" onClick=${()=>{setMode('register');setErr('')}}>New? Create a profile →</span>`
        :h`<span style="color:var(--green);cursor:pointer;font-weight:700" onClick=${()=>{setMode('login');setErr('')}}>Already have one? Sign in →</span>`}
    </div>
    <div style="margin-top:14px;background:var(--green-bg);border-radius:8px;padding:10px 13px;font-size:11px;color:var(--green)">🔒 Your data stays on this device only. Never uploaded anywhere.</div>
  </div></div>`;
}

// ─── OVERVIEW ─────────────────────────────────────────────────────────────────
function Overview({d,budget,prices,inflOn,inflRate}){
  const{gross,netAnnual,annualSavings,savingsRate,totalTax,marginal}=budget;
  const getP=h=>prices[h.ticker?.toUpperCase()]?.price||num(h.price);
  const allH=d.accounts.flatMap(a=>a.holdings);
  const totPort=allH.reduce((s,hh)=>s+num(hh.shares)*getP(hh),0);
  const totDivs=allH.reduce((s,hh)=>s+num(hh.shares)*num(hh.div),0);
  const cash=num(d.checkingBal)+num(d.savingsBal)+num(d.emergencyFund);
  const totLiab=d.liabilities.reduce((s,l)=>s+num(l.balance),0);
  const nomNW=totPort+cash-totLiab;
  const ir=inflRate/100;
  const projRows=buildProjection({budget,d,prices,inflRate:ir,years:10});
  const nomProj=projRows.map(r=>r.nomNW);
  const realProj=projRows.map(r=>r.realNW);
  const retYrs=Math.max(1,d.retireAge-d.age);
  const retRows=buildProjection({budget,d,prices,inflRate:ir,years:retYrs});
  const retNW=retRows[retRows.length-1]?.nomNW||0;
  const tips=[];
  if(savingsRate<.15)tips.push(`Savings rate is ${pct(savingsRate)} — below the 15–20% target. Boosting by 5% adds ${fmt(gross*.05)}/yr.`);
  else tips.push(`Savings rate of ${pct(savingsRate)} is solid. Keep compounding.`);
  if(totDivs>0)tips.push(`Portfolio generates ${fmt(totDivs/12)}/mo in dividends — ${fmt(totDivs)}/yr in passive income.`);
  if(marginal>=.22)tips.push(`At ${pct(marginal)} marginal rate, maxing your 401(k) could save ~${fmt((LIM.k401-budget.pre401k)*marginal)} in federal taxes this year.`);
  return h`<div class="stack fu">
    ${h`<${Disclaimer}/>`}
    <div class="coach">
      <div class="coach-hi">👋 Hey ${d.name},</div>
      <div class="coach-msg">At your current savings rate, you could reach ${fmt(retNW)} by age ${d.retireAge}${inflOn?` (${fmt(realVal(retNW,ir,retYrs))} in today's dollars)`:''} — generating ${fmt(retNW*.04/12)}/month using the 4% rule.</div>
      <div class="coach-tips">${tips.map((t,i)=>h`<div key="${i}" class="coach-tip">${t}</div>`)}</div>
    </div>
    <div class="g4">
      ${[['Net Worth',nomNW,inflOn?realVal(nomNW,ir,0):null,'Assets − Liabilities','#1a6b42'],
         ['Annual Savings',annualSavings,null,pct(savingsRate)+' of gross income','#1a4f8a'],
         ['Portfolio Value',totPort,null,allH.length+' holdings · '+d.accounts.length+' accounts','#9a6b1a'],
         ['Est. Tax Bill',totalTax,null,pct(budget.effective)+' effective · '+pct(marginal)+' marginal','#c0392b']
      ].map(([lbl,nom,rl,meta,c])=>h`<div class="stat">
        <div class="stat-bar" style="background:${c}"/>
        <div class="stat-l">${lbl}</div>
        <div class="stat-v">${fmt(nom)}</div>
        ${inflOn&&rl!==null?h`<div class="stat-v infl">${fmt(rl)} <span class="infl-badge">real</span></div>`:null}
        <div class="stat-m">${meta}</div>
      </div>`)}
    </div>
    <div class="g2">
      <div class="card">
        <div class="card-t">Income Allocation</div><div class="card-s">Annual — where it goes</div>
        ${h`<${Donut} slices=${[
          {label:'Taxes',value:Math.max(0,totalTax),color:'#c0392b'},
          {label:'Expenses',value:budget.expMonthly*12,color:'#1a4f8a'},
          {label:'Retirement',value:budget.retMonthly*12,color:'#1a6b62'},
          {label:'Free Savings',value:Math.max(0,annualSavings),color:'#1a6b42'},
        ].filter(s=>s.value>0)} ctr=${fmt(gross)} sub="gross"/>`}
        <div class="fn">Savings = Gross − Taxes − Expenses − Retirement Contributions</div>
      </div>
      <div class="card">
        <div class="card-t">10-Year Net Worth${inflOn?' (with Inflation)':''}</div>
        <div class="card-s">${inflOn?'Nominal (solid) vs. Real adjusted (dashed)':'Nominal projection'}</div>
        ${h`<${Spark} data=${nomProj} data2=${inflOn?realProj:null} h=${90}/>`}
        <div style="display:flex;justify-content:space-between;margin-top:6px">
          <span style="font-size:10.5px;color:var(--text3)">Today: ${fmt(nomNW)}</span>
          <span style="font-size:10.5px;color:var(--green);font-weight:700">Yr 10: ${fmt(nomProj[10])}</span>
        </div>
        ${inflOn?h`<div style="text-align:right;font-size:10px;color:var(--purple);font-weight:600;margin-top:2px">Real Yr 10: ${fmt(realProj[10])}</div>`:null}
        <div class="fn">Real = Nominal ÷ (1+${ir})^n. Portfolio compounds at weighted average expected return of your holdings.</div>
      </div>
    </div>
    <div class="g2">
      <div class="card">
        <div class="card-t">Monthly Cash Flow</div><div class="card-s">Take-home vs outflows</div>
        ${h`<${Bars} rows=${[
          {label:'Take-Home',value:netAnnual/12,color:'#6b6457'},
          {label:'Housing',value:d.expenses.filter(e=>e.cat==='housing').reduce((s,e)=>s+num(e.amount),0),color:'#1a4f8a'},
          {label:'Other Exp.',value:d.expenses.filter(e=>e.cat!=='housing').reduce((s,e)=>s+num(e.amount),0),color:'#9a6b1a'},
          {label:'Retirement',value:budget.retMonthly,color:'#1a6b62'},
          {label:'Debt Pmts',value:budget.debtPmt,color:'#c0392b'},
          {label:'Savings',value:Math.max(0,annualSavings/12),color:'#1a6b42'},
        ].filter(r=>r.value>0)}/>`}
        <div class="fn">Monthly Savings = Take-Home − All Expenses − Retirement − Debt Payments</div>
      </div>
      <div class="card">
        <div class="card-t">Retirement Snapshot</div><div class="card-s">Age ${d.retireAge} projection</div>
        ${[
          ['Projected Balance',fmt(retNW),'var(--purple)'],
          inflOn?['Real Balance (today\'s $)',fmt(realVal(retNW,ir,retYrs)),'var(--purple)']:null,
          ['4% Withdrawal / yr',fmt(retNW*.04),'var(--green)'],
          ['4% Withdrawal / mo',fmt(retNW*.04/12),'var(--green)'],
          ['Years to Retire',Math.max(0,d.retireAge-d.age)+' yrs','var(--blue)'],
        ].filter(Boolean).map(([l,v,c])=>h`<div style="display:flex;justify-content:space-between;padding-bottom:9px;border-bottom:1px solid var(--border)">
          <span style="font-size:12px;color:var(--text2)">${l}</span>
          <span style="font-family:var(--font-d);font-size:14px;color:${c};font-weight:700">${v}</span>
        </div>`)}
        <div class="fn">FV = PV×(1+r)^n + PMT×((1+r)^n−1)/r. r = portfolio weighted avg expected return.</div>
      </div>
    </div>
  </div>`;
}

// ─── TAX TAB ──────────────────────────────────────────────────────────────────
function TaxTab({d,budget,prices}){
  const{w2,se,passive,gross,pre401k,tradIRA,hsaDed,seDed,slIntDed,agi,stdDed,ded,credits,taxable,fedTax:ft,fica,stateTax,totalTax,marginal,effective}=budget;

}

            <span style="font-size:10.5px;color:var(--purple);font-weight:700">Age ${d.retireAge}: ${fmt(retProj[yrs])}</span>
          </div>
          <div class="ins g"><div class="ins-l">4% Withdrawal ${h`<${Tip} k="safe4"><span/></>`}</div><p>${fmt(retProj[yrs]*.04)}/yr · ${fmt(retProj[yrs]*.04/12)}/mo</p></div>
          <div class="fn">FV = PV×(1+r)^n + PMT×((1+r)^n−1)/r. r=${rp.r}%/yr, n=${yrs}yrs. Actual returns will vary.</div>
        </div>
      </div>
    </div>`}
    ${sub==='insights'&&h`<div class="stack">
      ${(()=>{
        const ins=[];
        if(sharpe<.5&&totPort>0)ins.push({t:'a',title:'Low Sharpe Ratio',msg:`Sharpe of ${sharpe.toFixed(2)} indicates high risk relative to returns. Consider diversifying with bond ETFs (BND, AGG).`});
        if(sharpe>=1.5)ins.push({t:'g',title:'Strong Risk-Adjusted Returns',msg:`Sharpe of ${sharpe.toFixed(2)} — solid returns per unit of risk.`});
        const top=[...allH].sort((a,b)=>num(b.shares)*getP(b)-num(a.shares)*getP(a))[0];
        if(top&&totPort>0&&(num(top.shares)*getP(top))/totPort>.4)ins.push({t:'r',title:'Concentration Risk',msg:`${top.ticker} is ${pct((num(top.shares)*getP(top))/totPort)} of your portfolio. High single-stock concentration increases risk.`});
        if(totDivs/Math.max(totPort,1)<.01&&totPort>0)ins.push({t:'b',title:'Low Dividend Yield',msg:'Under 1% dividend yield. SCHD or VYM could add meaningful passive income.'});
        if(ins.length===0)ins.push({t:'g',title:'Looking Good!',msg:'Portfolio appears balanced. Add more holdings for deeper analysis.'});
        return ins.map((i,idx)=>h`<div key="${idx}" class="${`ins ${i.t}`}"><div class="ins-l">${i.title}</div><p>${i.msg}</p></div>`);
      })()}
    </div>`}
  </div>`;
}

// ─── NET WORTH ────────────────────────────────────────────────────────────────
function NetWorthTab({d,budget,prices,inflOn,inflRate}){
  const getP=hh=>prices[hh.ticker?.toUpperCase()]?.price||num(hh.price);
  const allH=d.accounts.flatMap(a=>a.holdings);
  const totPort=allH.reduce((s,hh)=>s+num(hh.shares)*getP(hh),0);
  const retVal=d.accounts.filter(a=>TAX_ADV.includes(a.type)).flatMap(a=>a.holdings).reduce((s,hh)=>s+num(hh.shares)*getP(hh),0);
  const taxVal=totPort-retVal;
  const cash=num(d.checkingBal)+num(d.savingsBal)+num(d.emergencyFund);
  const totLiab=d.liabilities.reduce((s,l)=>s+num(l.balance),0);
  const nomNW=totPort+cash-totLiab;
  const ir=inflRate/100;
  const projRows=buildProjection({budget,d,prices,inflRate:ir,years:30});
  const nomProj=projRows.map(r=>r.nomNW);
  const realProj=projRows.map(r=>r.realNW);
  return h`<div class="stack fu">
    <div class="g4">
      ${[['Net Worth',nomNW,inflOn?realVal(nomNW,ir,0):null,'Assets − Liabilities','#1a6b42'],
         ['Total Assets',totPort+cash,null,'Portfolio + Cash','#1a4f8a'],
         ['Total Liabilities',totLiab,null,d.liabilities.length+' debts','#c0392b'],
      ].map(([l,v,rl,m,c])=>h`<div class="stat"><div class="stat-bar" style="background:${c}"/><div class="stat-l">${l}</div><div class="stat-v">${fmt(v)}</div>${inflOn&&rl!==null?h`<div class="stat-v infl">${fmt(rl)} <span class="infl-badge">real</span></div>`:null}<div class="stat-m">${m}</div></div>`)}
      <div class="stat"><div class="stat-bar" style="background:#9a6b1a"/><div class="stat-l">Debt-to-Asset Ratio</div><div class="stat-v">${(totPort+cash)>0?pct(totLiab/(totPort+cash)):'—'}</div><div class="${`stat-m ${totLiab/(totPort+cash)<.3?'up':'dn'}`}">${totLiab/(totPort+cash)<.3?'Healthy':'Monitor'}</div></div>
    </div>
    <div class="g2">
      <div class="card"><div class="card-t">Assets Breakdown</div><div class="card-s">Complete picture</div>
        ${h`<${Donut} ctr=${fmt(totPort+cash)} sub="total assets" slices=${[
          {label:'Taxable Investments',value:taxVal,color:'#1a4f8a'},
          {label:'Retirement Accounts',value:retVal,color:'#5a3d8a'},
          {label:'Checking',value:num(d.checkingBal),color:'#1a6b42'},
          {label:'Savings / HYSA',value:num(d.savingsBal),color:'#1a6b62'},
          {label:'Emergency Fund',value:num(d.emergencyFund),color:'#9a6b1a'},
        ].filter(s=>s.value>0)}/>`}
      </div>
      <div class="card">
        <div class="card-t">30-Year Net Worth${inflOn?' — Nominal & Real':''}</div><div class="card-s">${inflOn?`Real = inflation-adj at ${inflRate}%/yr`:'Nominal projection'}</div>
        ${h`<${Spark} data=${nomProj} data2=${inflOn?realProj:null} h=${100}/>`}
        <div style="display:flex;justify-content:space-between;margin-top:7px">
          <span style="font-size:10.5px;color:var(--text3)">Today: ${fmt(nomNW)}</span>
          <span style="font-size:10.5px;color:var(--green);font-weight:700">Yr 30: ${fmt(nomProj[30])}</span>
        </div>
        ${inflOn?h`<div style="text-align:right;margin-top:3px"><span style="font-size:10px;color:var(--purple);font-weight:600">Real Yr 30: ${fmt(realProj[30])}</span></div>`:null}
        ${inflOn?h`<div style="margin-top:9px;padding:9px 12px;background:var(--purple-bg);border-radius:7px;font-size:11px;color:var(--purple)">💡 At ${inflRate}%/yr inflation, ${fmt(nomProj[30])} in 30 years = ${fmt(realProj[30])} in today's purchasing power.</div>`:null}
        <div class="fn">Real = Nominal ÷ (1+${ir})^n. Portfolio compounds at weighted avg expected return. Savings and liabilities accounted for each year.</div>
      </div>
    </div>
    ${d.liabilities.length>0?h`<div class="card"><div class="card-t">Debt Payoff Analysis</div><div class="card-s">Payoff timeline & total interest</div>
      <div class="tbl-wrap"><table class="tbl"><thead><tr><th>Debt</th><th class="r">Balance</th><th class="r">Rate</th><th class="r">Pmt/mo</th><th class="r">Payoff Yr</th><th class="r">Total Interest</th></tr></thead>
        <tbody>${d.liabilities.map(l=>{
          const bal=num(l.balance),rate=num(l.rate)/100/12,pmt=num(l.payment);
          const mos=rate>0&&pmt>bal*rate?-Math.log(1-bal*rate/pmt)/Math.log(1+rate):pmt>0?bal/pmt:0;
          const yr=new Date().getFullYear()+Math.ceil(mos/12);
          const interest=pmt*mos-bal;
          return h`<tr key="${l.id}"><td style="font-weight:600">${l.label}</td>
            <td class="r" style="color:var(--red);font-weight:700">${fmt(bal)}</td>
            <td class="r">${num(l.rate).toFixed(1)}%</td>
            <td class="r">${fmt(pmt)}</td>
            <td class="r">${mos>0?yr:'—'}</td>
            <td class="r" style="color:var(--amber)">${interest>0?fmt(interest):'—'}</td>
          </tr>`;
        })}</tbody>
      </table></div>
      <div class="fn">Payoff months = −ln(1 − balance × monthlyRate ÷ payment) ÷ ln(1+monthlyRate). Total interest = (payment × months) − original balance.</div>
    </div>`:null}
  </div>`;
}

// ─── CHATBOT ──────────────────────────────────────────────────────────────────
function Chatbot({d,budget,prices}){
  const[open,setOpen]=useState(false);
  const[msgs,setMsgs]=useState([{role:'ai',text:`Hi ${d.name}! 👋 I'm your AI financial assistant — I have access to all your data.\n\nTry asking: "Am I saving enough?", "How can I reduce taxes?", "What if I buy a house?"\n\n⚠️ I provide general educational information only — not personalized financial advice.`}]);
  const[inp,setInp]=useState('');
  const[loading,setLoading]=useState(false);
  const endRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'})},[msgs]);
  const getP=hh=>prices[hh.ticker?.toUpperCase()]?.price||num(hh.price);
  const allH=d.accounts.flatMap(a=>a.holdings);
  const totPort=allH.reduce((s,hh)=>s+num(hh.shares)*getP(hh),0);
  const ctx=`User data: Name:${d.name}, Age:${d.age}, Filing:${d.filingStatus}, Gross:${fmt(budget.gross)}, Net:${fmt(budget.netAnnual/12)}/mo, Savings:${fmt(budget.annualSavings)} (${pct(budget.savingsRate)}), Tax:${fmt(budget.totalTax)} eff:${pct(budget.effective)} marg:${pct(budget.marginal)}, Portfolio:${fmt(totPort)}, Accounts:${d.accounts.length}, RetireAt:${d.retireAge}, Liabilities:${fmt(d.liabilities.reduce((s,l)=>s+num(l.balance),0))}, Milestones:${d.timeline.map(m=>`${m.year}:${m.label}`).join(',')}`;
  const send=async()=>{
    if(!inp.trim()||loading)return;
    const q=inp.trim();setInp('');
    setMsgs(m=>[...m,{role:'user',text:q},{role:'ai',text:'',loading:true}]);
    setLoading(true);
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:[{role:'user',content:`You are a financial education assistant in a personal finance app. Be helpful and specific using the user's data. Always note you're providing general educational info, not professional advice. Keep responses to 3-4 sentences max for mobile readability.\n\n${ctx}\n\nQuestion: ${q}`}]})});
      const data=await res.json();
      const reply=data.content?.[0]?.text||"Couldn't process that — try again.";
      setMsgs(m=>m.map((x,i)=>i===m.length-1?{role:'ai',text:reply}:x));
    }catch{
      setMsgs(m=>m.map((x,i)=>i===m.length-1?{role:'ai',text:'Connection issue. Please try again.'}:x));
    }
    setLoading(false);
  };
  return h`<>
    <button class="chat-fab" onClick=${()=>setOpen(o=>!o)} title="Ask your AI assistant">${open?'✕':'💬'}</button>
    ${open&&h`<div class="chat-panel">
      <div class="chat-head">
        <div class="chat-ht"><span style="background:var(--green);border-radius:4px;padding:1px 5px;font-size:9px">AI</span> Financial Assistant</div>
        <button class="chat-hc" onClick=${()=>setOpen(false)}>✕</button>
      </div>
      <div class="chat-msgs">
        ${msgs.map((m,i)=>h`<div key="${i}" class="${`msg ${m.role}${m.loading?' loading':''}`}">${m.loading?'Thinking…':m.text}</div>`)}
        <div ref=${endRef}/>
      </div>
      <div class="chat-inp-row">
        <input class="chat-inp" placeholder="Ask a question…" value="${inp}" onInput=${e=>setInp(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&send()} disabled="${loading}"/>
        <button class="chat-send" onClick=${send} disabled="${loading||!inp.trim()}">→</button>
      </div>
    </div>`}
  </>`;
}

    });
    d.expenses.forEach(e=>items.push({title:e.label,sub:ECATS.find(c=>c.id===e.cat)?.label+' · '+fmt(e.amount)+'/mo',tab:'budget'}));
    d.incomes.forEach(i=>items.push({title:i.label,sub:'Income · '+fmt(i.amount)+'/yr',tab:'budget'}));
    d.liabilities.forEach(l=>items.push({title:l.label,sub:'Debt · '+fmt(l.balance),tab:'networth'}));
    d.timeline.forEach(m=>items.push({title:m.label,sub:m.year+' · '+m.cat,tab:'timeline'}));
    return items;
  },[d]);
  const results=q.length>1?idx.filter(i=>i.title.toLowerCase().includes(q.toLowerCase())||i.sub.toLowerCase().includes(q.toLowerCase())).slice(0,8):[];
  return h`<div class="sw" ref=${ref}>
    <span class="s-ico">🔍</span>
    <input class="si" placeholder="Search…" value="${q}" onInput=${e=>{setQ(e.target.value);setShow(true)}} onFocus=${()=>setShow(true)}/>
    ${show&&results.length>0&&h`<div class="sr">${results.map((r,i)=>h`<div key="${i}" class="sri" onClick=${()=>{setTab(r.tab);setShow(false);setQ('')}}>
      <div class="sri-t">${r.title}</div><div class="sri-s">${r.sub}</div>
    </div>`)}</div>`}
  </div>`;
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
const TABS=[
  {id:'overview',icon:'📊',label:'Overview',short:'Home'},
  {id:'budget',icon:'💰',label:'Budget',short:'Budget'},
  {id:'taxes',icon:'📋',label:'Taxes 2026',short:'Taxes'},
  {id:'investments',icon:'📈',label:'Investments',short:'Invest'},
  {id:'networth',icon:'💎',label:'Net Worth',short:'Worth'},
  {id:'timeline',icon:'🗺',label:'Life Timeline',short:'Timeline'},
];

function App(){
  const[profile,setProfile]=useState(null);
  const[tab,setTab]=useState('overview');
  const[prices,setPrices]=useState({});
  const[inflOn,setInflOn]=useState(false);
  const[mobNavOpen,setMobNavOpen]=useState(false);
  useEffect(()=>{
    const last=localStorage.getItem('sf_v4_last');
    if(last){const ps=loadP();if(ps[last])setProfile(ps[last]);}
  },[]);
  const login=p=>{setProfile(p);localStorage.setItem('sf_v4_last',p.id)};
  const logout=()=>{setProfile(null);localStorage.removeItem('sf_v4_last')};
  const upd=useCallback(patch=>{
    setProfile(prev=>{
      const next={...prev,data:{...prev.data,...patch}};
      const ps=loadP();ps[prev.id]=next;saveP(ps);
      return next;
    });
  },[]);
  const d=profile?.data;
  const budget=useMemo(()=>d?calcBudget(d):{w2:0,se:0,passive:0,gross:0,pre401k:0,tradIRA:0,hsaDed:0,seDed:0,slIntDed:0,agi:0,stdDed:15000,itemDed:0,ded:15000,credits:0,taxable:0,fedTax:0,fica:{ss:0,med:0,addl:0,total:0},stateTax:0,totalTax:0,netAnnual:0,retMonthly:0,expMonthly:0,debtPmt:0,annualSavings:0,savingsRate:0,marginal:.22,effective:0},[
    d?.incomes,d?.bonus,d?.retirement,d?.filingStatus,d?.stateRate,d?.expenses,d?.itemize,d?.deductions,d?.credits,d?.liabilities
  ]);
  const inflRate=parseFloat(d?.inflationRate||3);
  if(!profile)return h`<${AuthScreen} onLogin=${login}/>`;
  const PAGE_TITLES={overview:'Overview',budget:'Budget & Expenses',taxes:'Tax Estimator — 2026',investments:'Investments',networth:'Net Worth',timeline:'Life Timeline'};
  return h`<div class="app-shell">
    <!-- MOBILE HEADER -->
    <div class="mob-header">
      <div class="mob-brand">SimpliFinance</div>
      <button class="mob-menu" onClick=${()=>setMobNavOpen(o=>!o)}>☰</button>
    </div>
    <!-- SIDEBAR OVERLAY -->
    <div class="${`nav-overlay${mobNavOpen?' show':''}`}" onClick=${()=>setMobNavOpen(false)}/>
    <!-- DESKTOP/MOBILE SIDEBAR -->
    <div class="desktop-shell">
      <aside class="${`sidebar${mobNavOpen?' open':''}`}">
        <div class="sb-brand"><div class="sb-name">SimpliFinance</div><div class="sb-tag">Your financial OS</div></div>
        <nav class="sb-nav">
          ${TABS.map(t=>h`<button key="${t.id}" class="${`ni${tab===t.id?' on':''}`}" onClick=${()=>{setTab(t.id);setMobNavOpen(false)}}><span class="ni-ico">${t.icon}</span>${t.label}</button>`)}
        </nav>
        <div class="sb-foot">
          <div class="user-row" onClick=${logout} title="Sign out">
            <div class="uav">${d.name[0].toUpperCase()}</div>
            <div><div class="uname">${d.name}</div><div class="uhint">Tap to sign out</div></div>
          </div>
        </div>
      </aside>
      <div class="main-area">
        <div class="topbar">
          <div class="tb-title">${PAGE_TITLES[tab]}</div>
          <button class="${`infl-btn${inflOn?' on':''}`}" onClick=${()=>setInflOn(v=>!v)}>
            <span class="infl-dot"/>
            ${inflOn?`Inflation ON`:' Inflation Adj'}
          </button>
          ${inflOn?h`<input class="infl-rate-input" type="number" value="${d.inflationRate||3}" onInput=${e=>upd({inflationRate:e.target.value})} placeholder="3"/>`:null}
          ${h`<${SearchBar} d=${d} setTab=${setTab}/>`}
        </div>
        <div class="page">
          ${tab==='overview'&&h`<${Overview} d=${d} budget=${budget} prices=${prices} inflOn=${inflOn} inflRate=${inflRate}/>`}
          ${tab==='budget'&&h`<${BudgetTab} d=${d} upd=${upd} budget=${budget}/>`}
          ${tab==='taxes'&&h`<${TaxTab} d=${d} budget=${budget} prices=${prices}/>`}
          ${tab==='investments'&&h`<${InvestTab} d=${d} upd=${upd} prices=${prices} setPrices=${setPrices} budget=${budget}/>`}
          ${tab==='networth'&&h`<${NetWorthTab} d=${d} budget=${budget} prices=${prices} inflOn=${inflOn} inflRate=${inflRate}/>`}
          ${tab==='timeline'&&h`<${TimelineTab} d=${d} upd=${upd} budget=${budget} prices=${prices} inflOn=${inflOn} inflRate=${inflRate}/>`}
        </div>
      </div>
    </div>
    <!-- MOBILE BOTTOM NAV -->
    <div class="bottom-nav">
      <div class="bnav">
        ${TABS.map(t=>h`<button key="${t.id}" class="${`bni${tab===t.id?' on':''}`}" onClick=${()=>setTab(t.id)}>
          <span class="bni-ico">${t.icon}</span>
          <span>${t.short}</span>
        </button>`)}
      </div>
    </div>
    ${h`<${Chatbot} d=${d} budget=${budget} prices=${prices}/>`}
  </div>`;
}

render(h(App,null), document.getElementById('root'));
</script>
</body>
</html>
